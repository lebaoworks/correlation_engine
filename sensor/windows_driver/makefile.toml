# cargo-make pipeline for the WDK image (stampinf → inf2cat → infverif → test-sign).
#
# The load_script bootstraps wdk-build's shared `rust-driver-makefile.toml` into
# `target/` as a **symlink** (its `path = "."` dep only resolves through the link).
# Creating that symlink needs Developer Mode or an elevated/eWDK prompt on Windows;
# without it, `cargo make` fails at `wdk-build-init`. On such a host, package with the
# manual stampinf/inf2cat/signtool steps in `readme.md` instead.
#
#     cargo make            # build + package the signed .sys/.inf/.cat
extend = "target/rust-driver-makefile.toml"

[config]
load_script = '''
#!@rust
//! ```cargo
//! [dependencies]
//! wdk-build = "0.5.1"
//! ```
wdk_build::cargo_make::load_rust_driver_makefile()?
'''
